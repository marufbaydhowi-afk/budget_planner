<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Transactions</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<h3>Budget Planner</h3>

<ul>

<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="transaksi.html">Transactions</a></li>
<li><a href="kategori.html">Categories</a></li>
<li><a href="analisis.html">Analytics</a></li>

</ul>

</div>

<div class="content">

<h2>Transactions</h2>

<!-- FORM -->

<div class="card p-4 mb-4">

<h4>Tambah Transaksi</h4>

<div class="row">

<div class="col-md-4">

<input
id="name"
class="form-control"
placeholder="Nama">

</div>

<div class="col-md-4">

<input
id="amount"
type="number"
class="form-control"
placeholder="Jumlah">

</div>

<div class="col-md-4">

<select
id="type"
class="form-select">

<option value="">
Pilih Jenis
</option>

<option value="income">
Pemasukan
</option>

<option value="expense">
Pengeluaran
</option>

</select>

</div>

</div>

<div class="row mt-3">

<div class="col-md-4">

<select
id="category"
class="form-select">
</select>

</div>

<div class="col-md-4">

<input
type="date"
id="date"
class="form-control">

</div>

<div class="col-md-4">

<button
id="saveBtn"
class="btn btn-primary w-100">

Simpan

</button>

</div>

</div>

</div>

<!-- SEARCH -->

<div class="card p-3 mb-3">

<div class="row">

<div class="col-md-4">

<input
id="search"
class="form-control"
placeholder="Cari transaksi">

</div>

<div class="col-md-3">

<select
id="filterType"
class="form-select">

<option value="">
Semua Jenis
</option>

<option value="income">
Pemasukan
</option>

<option value="expense">
Pengeluaran
</option>

</select>

</div>

<div class="col-md-3">

<select
id="sort"
class="form-select">

<option value="newest">
Terbaru
</option>

<option value="oldest">
Terlama
</option>

<option value="highest">
Nominal Terbesar
</option>

<option value="lowest">
Nominal Terkecil
</option>

</select>

</div>

<div class="col-md-2">

<button
id="exportCSV"
class="btn btn-success">

CSV

</button>

</div>

</div>

</div>

<!-- TABLE -->

<div class="card p-3">

<table class="table">

<thead>

<tr>

<th>Nama</th>
<th>Kategori</th>
<th>Jenis</th>
<th>Jumlah</th>
<th>Tanggal</th>
<th>Aksi</th>

</tr>

</thead>

<tbody id="transactionTable">

</tbody>

</table>

</div>

</div>

</div>

<script src="../js/storage.js"></script>
<script src="../js/transaksi.js"></script>

<script>

if(localStorage.getItem("darkMode")==="true"){

document.body.classList.add("dark-mode");

}

document
.getElementById("darkModeBtn")
?.addEventListener("click",()=>{

document.body.classList.toggle("dark-mode");

localStorage.setItem(
"darkMode",
document.body.classList.contains("dark-mode")
);

});

</script>

</body>
</html>
