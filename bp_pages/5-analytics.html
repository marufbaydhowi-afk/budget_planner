<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Analytics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="../css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<h3>Budget Planner</h3>

<ul>

<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="transaksi.html">Transactions</a></li>
<li><a href="kategori.html">Categories</a></li>
<li><a href="analisis.html">Analytics</a></li>

</ul>

</div>

<div class="content">

<h2>Analytics</h2>



<div class="row mb-4">

<div class="col-md-3">

<div class="card p-3">

<h6>Total Transaksi</h6>

<h3 id="totalTransactions">0</h3>

</div>

</div>

<div class="col-md-3">

<div class="card p-3">

<h6>Rata-rata Pengeluaran</h6>

<h3 id="avgExpense">0</h3>

</div>

</div>

<div class="col-md-3">

<div class="card p-3">

<h6>Rata-rata Pemasukan</h6>

<h3 id="avgIncome">0</h3>

</div>

</div>

<div class="col-md-3">

<div class="card p-3">

<h6>Pengeluaran Terbesar</h6>

<h3 id="maxExpense">0</h3>

</div>

</div>

</div>



<div class="card p-4 mb-4">

<h5>Pengeluaran Berdasarkan Kategori</h5>

<canvas id="pieChart"></canvas>

</div>



<div class="card p-4 mb-4">

<h5>Pemasukan vs Pengeluaran</h5>

<canvas id="barChart"></canvas>

</div>



<div class="card p-4">

<h5>Tren Pengeluaran Harian</h5>

<canvas id="lineChart"></canvas>

</div>

</div>

</div>

<script src="../js/storage.js"></script>
<script src="../js/analisis.js"></script>

<script>

if(localStorage.getItem("darkMode")==="true"){

document.body.classList.add("dark-mode");

}

document
.getElementById("darkModeBtn")
?.addEventListener("click",()=>{

document.body.classList.toggle("dark-mode");

localStorage.setItem(
"darkMode",
document.body.classList.contains("dark-mode")
);

});

</script>
</body>

</html>
